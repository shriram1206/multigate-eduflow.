<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#667eea">
    <title>Set New Password - MEF Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f5f5f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { 
            background: #ffffff; width: 100%; max-width: 460px; padding: 40px; 
            border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); 
        }
        h2 { font-size: 2rem; font-weight: 600; color: #1d1d1f; text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #86868b; margin-bottom: 30px; font-size: 0.95rem; line-height: 1.5; }
        label { display: block; font-size: 0.95rem; color: #1d1d1f; margin-bottom: 8px; font-weight: 500; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        input[type="password"], input[type="text"] {
            width: 100%; padding: 14px 16px; border: 1px solid #d2d2d7; 
            border-radius: 12px; font-size: 1rem; transition: all 0.2s ease; padding-right: 50px;
        }
        input:focus { outline: none; border-color: #0071e3; box-shadow: 0 0 0 4px rgba(0,113,227,0.1); }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #86868b; cursor: pointer; padding: 8px; font-size: 1.1rem;
        }
        .toggle-password:hover { color: #1d1d1f; }
        
        .btn-primary {
            width: 100%; padding: 14px; background-color: #34c759; color: #ffffff; border: none; 
            border-radius: 12px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.2s ease; margin-top: 10px;
        }
        .btn-primary:hover { background-color: #30b752; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(52,199,89,0.3); }
        
        /* Strength Bar */
        .strength-container { margin-bottom: 25px; margin-top: -5px; }
        .strength-bar { height: 6px; border-radius: 3px; background: #e5e5e7; overflow: hidden; margin-bottom: 5px; }
        .strength-fill { height: 100%; width: 0%; border-radius: 3px; transition: all 0.3s ease; }
        .strength-label { font-size: 0.8rem; color: #86868b; text-align: right; }
        
        .alert { padding: 14px 18px; margin-bottom: 20px; border-radius: 12px; font-weight: 500; text-align: center; font-size: 0.95rem; }
        .alert-danger { background-color: #fff5f5; color: #c41e3a; border: 1px solid #ffd4d9; }
        @media (max-width: 480px) { .login-container { border-radius: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; } }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Set New Password</h2>
        <p>Choose a strong password matching the MEF Portal requirements.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <label for="new_password">New Password:</label>
            <div class="input-group">
                <input type="password" id="new_password" name="new_password" required minlength="8" placeholder="••••••••">
                <button type="button" class="toggle-password" onclick="togglePwd('new_password', 'icon1')">
                    <i id="icon1" class="fas fa-eye"></i>
                </button>
            </div>

            <label for="confirm_password">Confirm Password:</label>
            <div class="input-group">
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8" placeholder="••••••••">
                <button type="button" class="toggle-password" onclick="togglePwd('confirm_password', 'icon2')">
                    <i id="icon2" class="fas fa-eye"></i>
                </button>
            </div>

            <div class="strength-container">
                <div class="strength-bar"><div id="strength-fill" class="strength-fill"></div></div>
                <div id="strength-label" class="strength-label"></div>
            </div>

            <button type="submit" class="btn-primary">
                <i class="fas fa-shield-alt"></i> Reset Password
            </button>
        </form>
    </div>

    <script>
        function togglePwd(inputId, iconId) {
            const inp = document.getElementById(inputId);
            const ico = document.getElementById(iconId);
            if (inp.type === 'password') {
                inp.type = 'text'; ico.className = 'fas fa-eye-slash';
            } else {
                inp.type = 'password'; ico.className = 'fas fa-eye';
            }
        }

        document.getElementById('new_password').addEventListener('input', function() {
            const val = this.value;
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            
            const fill = document.getElementById('strength-fill');
            const label = document.getElementById('strength-label');
            const colors = ['#ff3b30', '#ff9500', '#ffcc00', '#34c759'];
            const labels = ['Weak', 'Fair', 'Good', 'Strong'];
            
            fill.style.width = (score * 25) + '%';
            fill.style.backgroundColor = colors[score - 1] || '#ff3b30';
            label.textContent = score > 0 ? labels[score - 1] : '';
        });
    </script>
</body>
</html>
