<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>502 - Bad Gateway | MEF Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff6e7f 0%, #bfe9ff 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .error-code {
            font-size: 120px;
            font-weight: 900;
            color: #ff6e7f;
            margin: 0;
        }
        .error-title {
            font-size: 32px;
            color: #333;
            margin: 10px 0;
        }
        .error-message {
            font-size: 16px;
            color: #666;
            margin: 20px 0;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #ff6e7f;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #e55866;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-code">502</h1>
        <h2 class="error-title">Bad Gateway</h2>
        <p class="error-message">
            The gateway received an invalid response from an upstream server.
            <br>
            Please try again later.
        </p>
        <a href="/" class="btn">Go Back to Home</a>
    </div>
</body>
</html>
